name: initiative-routing
description: 'Route an approved workspace or orchestration phase into concurrent repo-targeted initiative workstreams. Use after Phase Sync when execution scope is workspace or orchestration.'
author: "Compass"

# Critical variables from config
config_source: "{project-root}/_bmad/bmm/module.yaml"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
planning_root: "{config_source}:planning_root"
planning_current: "{config_source}:planning_current"
planning_repositories_file: "{config_source}:planning_repositories_file"
planning_initiatives_root: "{config_source}:planning_initiatives_root"
planning_initiative_index_file: "{config_source}:planning_initiative_index_file"
phase_snapshot_file: "{config_source}:phase_snapshot_file"
phase_state_file: "{config_source}:phase_state_file"
date: system-generated

# Workflow components
installed_path: "{project-root}/_bmad/compass/planning/bmad-compass-initiative-routing"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"

# Output
default_output_file: "{planning_current}/initiative-routing-report-{date}.md"
